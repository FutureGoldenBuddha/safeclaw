# =============================================================
# SafeClaw — docker-compose.yml (safety best practices)
# =============================================================
# Name of the Compose project
name: safeclaw    
services:
  # -----------------------------------------------------------
  # Main service — OpenClaw Agent
  # -----------------------------------------------------------
  openclaw:
    container_name: openclaw
    user: "root:root"
    build: ./containers/openclaw/debian
    volumes:
      - .openclaw_install:/workspace/.openclaw_install:rw  # should be read only, but...
      - .openclaw_data:/workspace/.openclaw_data:rw  # read write 
      - my_projects:/workspace/my_projects:rw  # read write
    env_file:
      - ./containers/openclaw/debian/openclaw.env
    ports:
      - "18789:18789"  # Gateway
      - "18790:18790"  # Bridge
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    # important to let devcontainer access this container
    # ...use when you need to work on a project outside the Docker container, equivalent to -i
    stdin_open: true
    # ...use to be able to “keep the container running”, equivalent to -t (see docker docs)
    tty: true
    restart: unless-stopped
    networks:
      - openclaw_internal_secure     # whitelisting internet acces
      - openclaw_internal_maintenance # open internet access (used when setting up openclaw)
    depends_on:
      - llama
    healthcheck:
      test: ["CMD", "node", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -----------------------------------------------------------
  # FORWARD PROXY for domains whitelisting
  # -----------------------------------------------------------
  openclaw_egress_proxy: # safe proxy, always active
    container_name: safe_proxy
    build:
      context: ./containers/squid/alpine
      dockerfile: Dockerfile.safe
    # ports:
    #   - "3128:3128"
    restart: always
    networks:
      - openclaw_internal_secure
      - openclaw_egress
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "squid", "-v"]
      interval: 15s
      timeout: 5s
      retries: 3
    # using depends_on to have a slight delay, not to restrict internet access while setting up
    depends_on:
      openclaw:
        condition: service_healthy
      llama:
        condition: service_healthy

  # -----------------------------------------------------------
  # FORWARD PROXY for open internet access (for maintenance)
  # -----------------------------------------------------------
  open_proxy_temp:
    container_name: open_proxy
    build:
      context: ./containers/squid/alpine
      dockerfile: Dockerfile.open
    ports:
      - "3129:3129"
    networks:
      - openclaw_internal_maintenance
      - openclaw_egress
    healthcheck:
      test: ["CMD", "squid", "-v"]
      interval: 15s
      timeout: 5s
      retries: 3
      
  # -----------------------------------------------------------
  # LLAMACPP — local LLM server
  # note: put the models in the /models folder before setup
  # -----------------------------------------------------------
  llama:
    container_name: llama
    # start as root, end as 1000 through entrypoint
    user: "root:root"  
    build: 
      context: ./containers/llm/llama/ubuntu
      dockerfile: Dockerfile   
    # security_opt: # workaround when a container needs to access files on the host system (via bind mounts)
    # but is being blocked by SELinux security policies
    #  - "label=disable"
    environment:
      # defines folder with permissions pto install npm
      npm_config_cache: /workspace/.npm-cache
      npm_config_prefix: /workspace/.npm-global
      # important for loading shared libraries
      LD_LIBRARY_PATH: /app:$LD_LIBRARY_PATH
      MODEL_PATH: /models/Ministral-3-3B-Instruct-2512-Q8_0.gguf
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all,compute,graphics,video,utility
    # ports:
    #   - "8080:8080"
    volumes:
      - ./models:/models:ro  # read only
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - openclaw_internal_secure   
      - openclaw_internal_maintenance 
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s # Increased to give the model/GPU time to initialize

  # -----------------------------------------------------------
  # embeddings - cognee
  # -----------------------------------------------------------
  embeddings:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: cognee_embeddings
    # ports:
    #   - "8081:8081"
    volumes:
      - ./models:/models
    command: >
      -m /models/nomic-embed-text-v1.5.Q8_0.gguf
      --host 0.0.0.0
      --port 8081
      --embeddings
      --ctx-size 8192 
      --batch-size 2048
      --ubatch-size 2048
      -ngl 0
    restart: unless-stopped
    networks:
      - openclaw_internal_secure   
      - openclaw_internal_maintenance 
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s # Increased to give the model/CPU time to initialize

  # -----------------------------------------------------------
  # postgreSQL com pgvector- cognee
  # -----------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16 
    container_name: cognee_postgres
    environment:
      - POSTGRES_DB=cognee_db
      - POSTGRES_USER=cognee_user
      - POSTGRES_PASSWORD=cognee_password
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - openclaw_internal_secure   
      - openclaw_internal_maintenance 
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognee_user -d cognee_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # main memory - cognee
  # -----------------------------------------------------------
  cognee:
    build:
      context: ./containers/mem/cognee/debian
      dockerfile: Dockerfile   
    container_name: cognee
    ports:
      - "8000:8000"
    env_file:
      - ./containers/mem/cognee/debian/cognee.env
    volumes:
      - cognee_data:/app/cognee/.cognee_system
      - cognee_logs:/app/logs
      - ./models/tokenizers:/tokenizers:ro
    restart: unless-stopped
    networks:
      - openclaw_internal_secure   
      - openclaw_internal_maintenance 
      - openclaw_host_access # for debug
    # depends_on:
    #   - llama
    #   - embeddings
    #   - postgres 
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  openclaw_internal_secure:
    internal: true
  openclaw_internal_maintenance:
    internal: true
  openclaw_egress:
    driver: bridge
  openclaw_host_access:        # new — non-internal, no internet routing
    driver: bridge
    internal: false

volumes:
  cognee_data:
    driver: local
  cognee_logs:
    driver: local
  postgres_data:
    driver: local
  my_projects:
    driver: local
  .openclaw_install:
    driver: local
  .openclaw_data:
    driver: local